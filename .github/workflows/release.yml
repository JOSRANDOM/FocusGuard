name: Release FocusGuard

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS Apple Silicon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: FocusGuard ${{ github.ref_name }}
          releaseBody: |
            ## Novedades en ${{ github.ref_name }}

            ### Descargas
            | Plataforma | Archivo |
            |------------|---------|
            | macOS Apple Silicon (M1/M2/M3) | `FocusGuard_*_aarch64.dmg` |
            | Windows 10/11 | `FocusGuard_*_x64-setup.exe` |

            ### Instalación
            - **macOS**: Abre el `.dmg`, arrastra FocusGuard a Aplicaciones.
            - **Windows**: Ejecuta el `.exe` como administrador.

            > La primera vez que ejecutes la app en macOS, ve a *Ajustes del Sistema → Privacidad y seguridad* si aparece un aviso de seguridad.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
