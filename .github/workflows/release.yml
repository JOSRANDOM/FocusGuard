name: Release FocusGuard

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: FocusGuard ${{ github.ref_name }}
          releaseBody: |
            ## Novedades en ${{ github.ref_name }}

            ### Descargas
            | Plataforma | Archivo |
            |------------|---------|
            | Windows 10/11 | `FocusGuard_*_x64-setup.exe` |

            ### Instalación
            - **Windows**: Ejecuta el `.exe` como administrador.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Publish stable-named asset (para el landing)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          src=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/nsis" -name "*.exe" | head -1)
          dest="FocusGuard-Windows-x64-setup.exe"
          cp "$src" "$dest"
          gh release upload "${{ github.ref_name }}" "$dest" --clobber --repo "${{ github.repository }}"
